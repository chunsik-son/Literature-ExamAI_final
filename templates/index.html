{% if result %}
<div class="exam-container" style="max-width: 650px; margin: 40px auto; padding: 30px; border: 2px solid #333; background-color: #ffffff; font-family: 'Malgun Gothic', sans-serif; line-height: 1.6;">
    
    <div class="exam-header" style="border-bottom: 1px solid #000; padding-bottom: 10px; margin-bottom: 20px;">
        <span style="font-weight: bold; font-size: 18px;">[대학수학능력시험 모의평가 유형]</span>
    </div>

    <div class="question-title" style="font-size: 18px; font-weight: bold; margin-bottom: 20px; word-break: keep-all;">
        Q. {{ result.question }}
    </div>
    
    <div class="options-group" style="margin-left: 10px; margin-bottom: 30px; font-size: 16px;">
        <div style="margin-bottom: 12px; word-break: keep-all;">① {{ result.option1 }}</div>
        <div style="margin-bottom: 12px; word-break: keep-all;">② {{ result.option2 }}</div>
        <div style="margin-bottom: 12px; word-break: keep-all;">③ {{ result.option3 }}</div>
        <div style="margin-bottom: 12px; word-break: keep-all;">④ {{ result.option4 }}</div>
        <div style="margin-bottom: 12px; word-break: keep-all;">⑤ {{ result.option5 }}</div>
    </div>
    
    <div class="explanation-box" style="margin-top: 20px; padding: 15px; border: 1px dashed #777; background-color: #fcfcfc;">
        <p style="color: #d9534f; font-weight: bold; font-size: 16px; margin: 0 0 8px 0;">🎯 정답 : {{ result.answer }}</p>
        <p style="color: #555; font-size: 14px; margin: 0;">💡 <strong>해설 :</strong> {{ result.explanation }}</p>
    </div>

</div>
{% endif %}
